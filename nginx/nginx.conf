events {
    worker_connections 1024;
}

http {
    upstream nextjs_cluster {
        server web:3000;
    }

    server {
        listen 80;
        server_name digidesa.tech www.digidesa.tech;

        # Digunakan oleh Certbot untuk verifikasi Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect traffic HTTP ke HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name digidesa.tech www.digidesa.tech;

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/digidesa.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/digidesa.tech/privkey.pem;

        location / {
            proxy_pass http://nextjs_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Menambah waktu tunggu (timeout) untuk request AI (Ollama) yang lama
            proxy_connect_timeout 540;
            proxy_send_timeout 540;
            proxy_read_timeout 540;
            send_timeout 540;
        }
    }
}
